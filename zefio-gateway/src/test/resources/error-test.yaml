- name: error1
  type: FixedFaultHandler
  config:
    errorCodeRules:
      - errorCode: "E123"
        offset: 5
        newCode: "ABC"
    valueOverrides:
      - offset: 0
        value: "XXXX"
    messageRule:
      offset: 10
      mode: "ERROR"
    requestEncoding: "utf-8"

- name: error2
  type: FixedFaultHandler
  config:
    errorCodeRules:
      - errorCode: "x"
        offset: 7
        newCode: "ZZZ"
    valueOverrides:
      - offset: 0
        value: "ABCD"
    messageRule:
      offset: 10
      mode: "ERROR"
    requestEncoding: "utf-8"

- name: error3
  type: FixedFaultHandler
  config:
    errorCodeRules:
      - errorCode: "x"
        offset: 0
        newCode: "AAA"
    valueOverrides:
      - offset: 0
        value: "ZZZ"
    # messageRule omitted → default: append error message after the original message
    requestEncoding: "utf-8"

- name: json1
  type: JsonFaultHandler
  config:
    errorCodeRules:
      - errorCode: "E123"
        key: "code"
        newCode: "ABC"
    valueOverrides:
      - key: "desc"
        value: "json override"
    messageRule:
      mode: "ERROR"
      key: "code"
    requestEncoding: "utf-8"

- name: xml1
  type: XmlFaultHandler
  config:
    errorCodeRules:
      - errorCode: "E123"
        key: "code"        # Target key for error code replacement
        newCode: "ABC"
    valueOverrides:
      - key: "desc"
        value: "xml override"
    messageRule:
      mode: "ERROR"
      key: "errorMessage"  # Separate key for prefix merging
    requestEncoding: "utf-8"
