# ==============================================================================
# Filename: application.yml
# Description: Entry point read at Zefio/Spring Boot startup.
#              Applied with domain-partitioning (Imports) philosophy.
# ==============================================================================
server:
  port: 52001

management:
  health:
    jms:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "*"
      path-mapping:
        health: health

spring:
  main:
    banner-mode: log
  config:
    import:
      - classpath:globals/zefio-platform.yaml
      - classpath:globals/telegrams.yaml
#      - classpath:flows/flow-hotswap.yaml

# ==============================================================================
# Zefio Unified Namespace Root
# ==============================================================================
zefio:
  node:
    id: ${ZEFIO_NODE_ID:DP-02}
    group: ${ZEFIO_NODE_GROUP:main}

  cp:
    enabled: true
    redis:
      url: redis://e000.bond:6379/0
    metrics:
      push-interval-ms: 3000

  # Explicit Zefio Domain Imports moved inside the root namespace
  imports:
    - "classpath:globals/zefio-platform.yaml"
    - "classpath:globals/telegrams.yaml"

  # Commented flows (Activated manually or via environment-specific profiles)
#    - "classpath:flows/flow-extreme-composite.yaml"
#    - "classpath:flows/flow-router-modify.yaml"
#    - "classpath:flows/flow-scatter-basic.yaml"
