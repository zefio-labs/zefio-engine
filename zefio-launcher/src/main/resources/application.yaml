# ==============================================================================
# Filename: application.yml
# Description: Entry point read at Zefio/Spring Boot startup.
#              Applied with domain-partitioning (Imports) philosophy.
# ==============================================================================
server:
  port: 52001

management:
  health:
    jms:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "*"
      path-mapping:
        health: health

zefio:
  # ==========================================
  # Node Identification
  # ==========================================
  node:
    id: ${ZEFIO_NODE_ID:DP-02}
    group: ${ZEFIO_NODE_GROUP:main}

  # ==========================================
  # Control Plane (CP) Telemetry Configuration
  # ==========================================
  cp:
    enabled: true
    api-url: http://127.0.0.1:3000
    redis:
      url: redis://e000.bond:6379/0
    metrics:
      push-interval-ms: 3000

spring:
  main:
    banner-mode: log
  config:
    import:
      - classpath:globals/global-options.yaml
      - classpath:globals/monitor.yaml
      - classpath:globals/system.yaml

# Explicit Zefio Domain Imports
imports:
  - "classpath:globals/global-options.yaml"
  - "classpath:globals/monitor.yaml"
  - "classpath:globals/system.yaml"
  - "classpath:globals/telegrams.yaml"

