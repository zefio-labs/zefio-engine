# ==============================================================================
# Filename: globals/errors.yaml
# Description: Global error handler configurations for centralized error processing
# ==============================================================================
global-errors:
  fixederror:
    type: FixedFaultHandler
    label: "Common Error Handling"
    config:
      errorCodeRules: []
      valueOverrides: []
      messageRule: null

  customerror:
    type: FixedFaultHandler
    label: "Common Error Handling"
    config:
      messageRule:
        offset: 522
        mode: "ERROR"
      valueOverrides:
        - offset: 168
          value: "1"
        - offset: 69
          value: "XNS"
        - offset: 72
          value: "XNS"
