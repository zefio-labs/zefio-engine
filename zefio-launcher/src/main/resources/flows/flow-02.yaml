flows:
  - name: inbound
    label: "2_TCP_High_Load_Relay"
    options:
      threadPool:
        corePoolSize: 300
        maxPoolSize: 500
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 50
          scaleDownStep: 20
      cpuQueue:
        capacity: 30000
      ioQueue:
        capacity: 50000

    ingress:
      name: from
      label: "Source Inbound (51002)"
      type: TcpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51002
        requestEncoding: utf-8
        responseEncoding: utf-8
    steps:
      - name: to
        label: "Target Request (TCP_SmallPool)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-async-standard
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51102
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
