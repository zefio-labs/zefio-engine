flows:
  - name: inbound
    label: "7_HTTP_TO_TCP_Massive"
    options:
      threadPool:
        corePoolSize: 200
        maxPoolSize: 400
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.7
          checkInterval: 5
          scaleUpStep: 30
          scaleDownStep: 10
      cpuQueue:
        capacity: 50000
      ioQueue:
        capacity: 20000

    # 🎯 Ingress: Synchronous (Sync)
    ingress:
      name: from
      label: "HTTP Inbound (51007)"
      type: HttpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51007
        requestEncoding: utf-8
        responseEncoding: utf-8
        # 🚀 [Business-Specific] HTTP Response Header Configuration
        responseContentType: text/plain

    # 🎯 Upstream: Synchronous (Sync) TCP 1,000 Pool
    steps:
      - name: to
        label: "Target Request (TCP_Massive)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-sync-massive
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51107
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
