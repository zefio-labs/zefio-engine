flows:
  - name: inbound
    label: "1_TCP_Sync_Bulk_Relay"
    options:
      threadPool:
        corePoolSize: 200
        maxPoolSize: 400
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.7
          checkInterval: 5
          scaleUpStep: 30
          scaleDownStep: 10
      cpuQueue:
        capacity: 50000
      ioQueue:
        capacity: 20000

    # 🎯 Architecture Left: Sync Plain (TCP + Fixed Message + Sync Profile)
    ingress:
      name: from
      label: "Source Inbound (51001)"
      type: TcpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51001
        requestEncoding: utf-8
        responseEncoding: utf-8

    # 🎯 Architecture Right: Sync Plain (TCP + Fixed Message + Sync Massive Profile)
    steps:
      - name: to
        label: "Target Request (TCP)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-sync-massive
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51101
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
