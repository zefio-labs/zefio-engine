flows:
  - name: inbound
    label: "5_TCP_High_Queue_Relay"
    options:
      threadPool:
        corePoolSize: 300
        maxPoolSize: 500
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 50
          scaleDownStep: 20
      cpuQueue:
        capacity: 100000
      ioQueue:
        capacity: 50000

    # 🎯 Ingress: Asynchronous (Async, Telegram matching)
    ingress:
      name: from
      label: "Source Inbound (51005)"
      type: TcpIngress
      telegram: fixed-standard
      profile: ingress-async
      exchangePattern: RequestReply
      config:
        port: 51005
        requestEncoding: utf-8
        responseEncoding: utf-8

    # 🎯 Upstream: Asynchronous (Async, Telegram matching) 10 Pool
    steps:
      - name: to
        label: "Target Request (TCP_Small)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-async-standard
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51105
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
