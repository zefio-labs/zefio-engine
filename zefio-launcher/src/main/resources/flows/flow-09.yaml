flows:
  - name: inbound
    label: "9_HTTP_TO_HTTP_Massive"
    options:
      threadPool:
        corePoolSize: 200
        maxPoolSize: 400
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.7
          checkInterval: 5
          scaleUpStep: 30
          scaleDownStep: 10
      cpuQueue:
        capacity: 50000
      ioQueue:
        capacity: 20000

    # 🎯 Ingress: Synchronous (Sync)
    ingress:
      name: from
      label: "HTTP Inbound (51009)"
      type: HttpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51009
        requestEncoding: utf-8
        responseEncoding: utf-8
        # 🚀 [Business-Specific] Inbound response Content-Type
        responseContentType: text/plain

    # 🎯 Upstream: Synchronous (Sync) HTTP 1,000 Pool
    steps:
      - name: to
        label: "Target Request (HTTP_Massive)"
        type: HttpUpstream
        telegram: fixed-standard
        profile: upstream-sync-massive
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51109
          # 🚀 [Business Routing] HTTP outbound specific settings
          requestContentType: text/plain
          requestHttpMethod: POST
          requestPath: service/
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
