flows:
  - name: inbound
    label: "6_TCP_TO_HTTP"
    options:
      threadPool:
        corePoolSize: 200
        maxPoolSize: 400
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.7
          checkInterval: 5
          scaleUpStep: 30
          scaleDownStep: 10
      cpuQueue:
        capacity: 50000
      ioQueue:
        capacity: 20000

    # 🎯 Ingress: Asynchronous (Async, Telegram matching)
    ingress:
      name: from
      label: "Source Inbound (51006)"
      type: TcpIngress
      telegram: fixed-standard
      profile: ingress-async
      exchangePattern: RequestReply
      config:
        port: 51006
        requestEncoding: utf-8
        responseEncoding: utf-8

    # 🎯 Upstream: Synchronous (Sync) HTTP 1000 Pool
    steps:
      - name: to
        label: "Target Request (HTTP)"
        type: HttpUpstream
        telegram: fixed-standard
        profile: upstream-sync-massive
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51106
          # Business-specific HTTP routing properties
          requestContentType: text/plain
          requestHttpMethod: POST
          requestPath: service/
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
