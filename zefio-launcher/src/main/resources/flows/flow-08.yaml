flows:
  - name: inbound
    label: "8_HTTP_TO_TCP_High_Queue"
    options:
      threadPool:
        corePoolSize: 300
        maxPoolSize: 500
        queueCapacity: 0
        autoScaling:
          enabled: true
          threshold: 0.5
          checkInterval: 5
          scaleUpStep: 50
          scaleDownStep: 20
      cpuQueue:
        capacity: 100000
      ioQueue:
        capacity: 50000

    # 🎯 Ingress: Synchronous (Sync)
    ingress:
      name: from
      label: "HTTP Inbound (51008)"
      type: HttpIngress
      telegram: fixed-standard
      profile: ingress-sync
      exchangePattern: RequestReply
      config:
        port: 51008
        requestEncoding: utf-8
        responseEncoding: utf-8
        # 🚀 [Business-Specific] HTTP Response Header
        responseContentType: text/plain

    # 🎯 Upstream: Asynchronous (Async, Telegram matching) 10 Pool
    steps:
      - name: to
        label: "Target Request (TCP_Small)"
        type: TcpUpstream
        telegram: fixed-standard
        profile: upstream-async-standard
        exchangePattern: RequestReply
        retry:
          enabled: false
        config:
          host: 192.168.3.218
          port: 51108
          requestEncoding: utf-8
          responseEncoding: utf-8
    on-error:
      - error-type: ANY
        refErrorHandler: fixederror
